<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#fff8f2",
                        "primary-container": "#5a7956",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#c3c8be",
                        "error": "#ba1a1a",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-bg {
            background: linear-gradient(135deg, rgba(255, 248, 242, 0.8) 0%, rgba(234, 225, 215, 0.6) 100%);
            backdrop-filter: blur(32px);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #42603f 0%, #5a7956 100%);
        }
        .asymmetric-canvas {
            background: 
                radial-gradient(circle at 10% 10%, #efe7dd 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, #e2ffda 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #fbf2e8 0%, transparent 100%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface overflow-hidden h-screen w-screen asymmetric-canvas flex items-center justify-center">
<!-- Suppressed Navigation Shell for Transactional Focus -->
<!-- Main Reset Password Card (480pt wide centered) -->
<main class="relative z-10 w-[640px] max-w-full px-6">
<div class="glass-bg p-12 rounded-xl shadow-2xl shadow-on-surface/5 flex flex-col items-center">
<!-- Logo Badge (Shared Component Logic) -->
<div class="mb-10 flex flex-col items-center">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-4 shadow-lg shadow-primary/10">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<div class="text-2xl font-headline font-bold text-primary tracking-tighter">Ladder</div>
</div>
<!-- Content Area -->
<div class="w-full max-w-[400px] text-center">
<h1 class="text-4xl font-headline font-bold text-on-surface mb-3 tracking-tight">Reset Password</h1>
<p class="text-on-surface-variant text-base leading-relaxed mb-10">
                    Enter your email and we'll send you a reset link
                </p>
<!-- Form Section -->
<form action="#" class="space-y-8 text-left">
<!-- Minimalist Input Field (Design System Specification) -->
<div class="group">
<label class="label-sm font-semibold text-primary uppercase tracking-widest text-[10px] mb-2 block ml-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b-2 border-outline-variant/40 py-3 px-1 focus:ring-0 focus:border-primary transition-all text-on-surface placeholder:text-outline h-[44px]" id="email" name="email" placeholder="name@college.edu" type="email"/>
<span class="material-symbols-outlined absolute right-2 top-2 text-outline-variant">mail</span>
</div>
<p class="text-[11px] mt-2 text-tertiary ml-1">Professional or educational email preferred.</p>
</div>
<!-- Primary CTA (Gradient Forest Green) -->
<button class="w-full h-[56px] primary-gradient text-white font-bold rounded-xl shadow-lg hover:shadow-primary/20 hover:scale-[0.99] active:scale-[0.97] transition-all flex items-center justify-center gap-2" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<!-- Tertiary Link -->
<div class="mt-10 flex justify-center">
<a class="group flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors py-2 px-4 rounded-lg" href="#">
<span class="material-symbols-outlined text-lg">arrow_back</span>
<span class="font-semibold text-sm border-b-2 border-secondary-fixed transition-all group-hover:border-primary">Back to Login</span>
</a>
</div>
</div>
</div>
<!-- Secondary Decoration (Asymmetric Aesthetic) -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-secondary-fixed/30 rounded-full blur-3xl -z-10"></div>
<div class="absolute -bottom-12 -left-12 w-48 h-48 bg-primary-container/10 rounded-full blur-3xl -z-10"></div>
</main>
<!-- Success Feedback Overlay (Visual State Component) -->
<!-- Note: Hidden by default, included for design completeness as per prompt request for success variant -->
<div class="hidden fixed inset-0 z-50 bg-surface/90 backdrop-blur-md flex items-center justify-center p-6">
<div class="bg-surface-container-lowest p-12 rounded-xl max-w-[480px] w-full text-center shadow-xl">
<div class="w-20 h-20 bg-secondary-container rounded-full flex items-center justify-center mx-auto mb-8">
<span class="material-symbols-outlined text-on-secondary-container text-4xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="text-3xl font-headline font-bold text-on-surface mb-4">Link Dispatched</h2>
<p class="text-on-surface-variant mb-10">
                Check your inbox for <span class="font-bold text-primary">name@college.edu</span>. We’ve sent a secure link to reset your credentials.
            </p>
<button class="w-full h-[56px] bg-surface-container-highest text-on-surface font-bold rounded-xl hover:bg-surface-container-high transition-all">
                Close
            </button>
</div>
</div>
<!-- Decorative Illustration Background Element -->
<div class="absolute bottom-10 right-10 opacity-10 pointer-events-none">
<img class="w-64 grayscale" data-alt="abstract fine line art of a minimalist ladder leaning against a classic academic column with soft botanical leaves around the base" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCVWpDC8zP3A_I22ao_5YHs3SkJeUh-2F78EGAwc48ct6BcrDcsY4hjHkS-qOwZUx9atNJEWxzVTpOIWCZD3IHghaXFaL-cCqFXcXfZpEez9KCDeRgGyJR8fwF-YiFghjScxXJpoReEaaJ5ipdxr2a3uf86xDXTp5dF_2L0b78UQuCkHXpvoV4lWLFbLrpTjjzH4CMBQHBp2TjgW8GwzOS_ZVemUjPgqFoBEMl2AX74znFPI6UHAEc42YpWwAV4c_-sSDSo7tH_1B4"/>
</div>
</body></html>
