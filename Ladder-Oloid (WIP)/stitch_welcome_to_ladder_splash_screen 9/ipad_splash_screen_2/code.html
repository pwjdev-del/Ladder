<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ladder Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;family=Manrope:wght@300;400;500;600;700&amp;family=Montserrat:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed": "#caf24d",
                    "outline-variant": "#c3c8be",
                    "surface-container": "#f5ede2",
                    "on-error": "#ffffff",
                    "on-secondary-fixed-variant": "#3c4d00",
                    "on-tertiary-container": "#fff5ee",
                    "on-secondary-container": "#566c00",
                    "error-container": "#ffdad6",
                    "on-tertiary": "#ffffff",
                    "error": "#ba1a1a",
                    "primary": "#42603f",
                    "on-background": "#1f1b15",
                    "inverse-surface": "#343029",
                    "surface-dim": "#e1d9cf",
                    "on-tertiary-fixed-variant": "#5e4122",
                    "tertiary-container": "#8d6a48",
                    "tertiary-fixed": "#ffdcbd",
                    "surface": "#fff8f2",
                    "primary-fixed": "#c9ecc2",
                    "primary-fixed-dim": "#aed0a7",
                    "surface-variant": "#eae1d7",
                    "tertiary": "#725232",
                    "on-secondary-fixed": "#161e00",
                    "inverse-primary": "#aed0a7",
                    "tertiary-fixed-dim": "#e9bf96",
                    "on-surface": "#1f1b15",
                    "on-error-container": "#93000a",
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#f8efe5",
                    "surface-container-high": "#efe7dd",
                    "surface-container-low": "#fbf2e8",
                    "secondary-container": "#caf24d",
                    "surface-container-lowest": "#ffffff",
                    "secondary": "#516600",
                    "on-secondary": "#ffffff",
                    "on-surface-variant": "#434840",
                    "secondary-fixed-dim": "#afd531",
                    "on-primary-fixed": "#052107",
                    "on-primary-container": "#e2ffda",
                    "outline": "#737970",
                    "surface-container-highest": "#eae1d7",
                    "on-primary-fixed-variant": "#304e2e",
                    "on-tertiary-fixed": "#2c1600",
                    "background": "#fff8f2",
                    "surface-tint": "#486644",
                    "primary-container": "#5a7956",
                    "surface-bright": "#fff8f2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Noto Serif"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-splash-gradient {
            background: linear-gradient(135deg, #42603f 0%, #fff8f2 100%);
        }
        .logo-glow {
            filter: drop-shadow(0 0 25px rgba(161, 198, 33, 0.4));
        }
        .premium-letter-spacing {
            letter-spacing: -0.04em;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface m-0 p-0 overflow-hidden">
<!-- Splash Screen Container (Landscape Focus) -->
<main class="h-screen w-screen bg-splash-gradient flex flex-col items-center justify-between relative">
<!-- Top Decorative Element (Subtle Asymmetry) -->
<div class="absolute top-12 left-12 opacity-10">
<h2 class="font-headline italic text-4xl text-on-primary">The Academic Atelier</h2>
</div>
<!-- Central Brand Cluster -->
<div class="flex-1 flex flex-col items-center justify-center">
<!-- Logo Icon: Graduation Cap inside Rotated Square -->
<div class="relative mb-10">
<!-- Rotated Square Background -->
<div class="w-32 h-32 bg-primary rotate-45 rounded-xl flex items-center justify-center logo-glow border border-primary-container/20">
<!-- Icon Layer -->
<div class="transform -rotate-45 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary-fixed text-6xl" style="font-variation-settings: 'FILL' 1;">
                            school
                        </span>
</div>
</div>
<!-- Secondary Fixed Accent Glow Detail -->
<div class="absolute -bottom-2 -right-2 w-8 h-8 bg-secondary-fixed rounded-full blur-xl opacity-50"></div>
</div>
<!-- Wordmark -->
<div class="text-center">
<h1 class="font-headline font-bold text-7xl text-primary premium-letter-spacing">
                    Ladder
                </h1>
<p class="font-body text-primary/60 tracking-[0.4em] uppercase text-xs mt-3 ml-2">
                    College Prep
                </p>
</div>
</div>
<!-- Bottom Loading & Progress Area -->
<div class="w-full max-w-xl px-12 pb-24 flex flex-col items-center gap-6">
<!-- Loading Indicator -->
<div class="w-full h-1 bg-primary/10 rounded-full overflow-hidden">
<!-- Simulated Progress: High-end thin bar -->
<div class="h-full bg-secondary-fixed w-1/3 rounded-full shadow-[0_0_12px_rgba(202,242,77,0.6)]"></div>
</div>
<!-- Status Text -->
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary/40 text-sm">
                    sync
                </span>
<span class="text-primary/50 text-[10px] font-medium tracking-widest uppercase">
                    Initializing Campus Records...
                </span>
</div>
</div>
<!-- Contextual Graphic (Editorial Asymmetry) -->
<div class="absolute bottom-0 right-0 w-1/3 h-1/2 opacity-20 pointer-events-none">
<img alt="University Architecture" class="w-full h-full object-cover rounded-tl-[100px]" data-alt="Dreamy low-angle shot of ivy-covered brick university tower against a soft pastel sky with organic shadows and high-end editorial feel" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDw1BaxEMEDCPuHqeO-CXuJvZN0BDvZPRFFKkpHPnGCLYzb86cUttUigUJLkLetI8pkODHdF7_UKwvRrEbAggzj3SjDXQksd8iZERRWELitA_tqDX2MDr6m337r-lsrBLzFIxhgvsJlTcAjFI4fEyqKOJcw4ysdXCl8wfLDT0pHtOb5K8Jikgq8kg5cmu12T49G4vB8QMoWXVIs1WWvBlaPbckaswfOxQ7r-UDyfYu-XV12F90BvQicv4UqSZflx9WLrKzYUnyoL0Q"/>
</div>
<!-- Subtle Textural Overlay -->
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/natural-paper.png')] opacity-[0.03] pointer-events-none"></div>
</main>
<!-- Shared Components are suppressed as per UI shell rules for Splash/Transactional screens -->
</body></html>
