<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ladder - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;family=Montserrat:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#caf24d",
                        "outline-variant": "#c3c8be",
                        "surface-container": "#f5ede2",
                        "on-error": "#ffffff",
                        "on-secondary-fixed-variant": "#3c4d00",
                        "on-tertiary-container": "#fff5ee",
                        "on-secondary-container": "#566c00",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "primary": "#42603f",
                        "on-background": "#1f1b15",
                        "inverse-surface": "#343029",
                        "surface-dim": "#e1d9cf",
                        "on-tertiary-fixed-variant": "#5e4122",
                        "tertiary-container": "#8d6a48",
                        "tertiary-fixed": "#ffdcbd",
                        "surface": "#fff8f2",
                        "primary-fixed": "#c9ecc2",
                        "primary-fixed-dim": "#aed0a7",
                        "surface-variant": "#eae1d7",
                        "tertiary": "#725232",
                        "on-secondary-fixed": "#161e00",
                        "inverse-primary": "#aed0a7",
                        "tertiary-fixed-dim": "#e9bf96",
                        "on-surface": "#1f1b15",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f8efe5",
                        "surface-container-high": "#efe7dd",
                        "surface-container-low": "#fbf2e8",
                        "secondary-container": "#caf24d",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#516600",
                        "on-secondary": "#ffffff",
                        "on-surface-variant": "#434840",
                        "secondary-fixed-dim": "#afd531",
                        "on-primary-fixed": "#052107",
                        "on-primary-container": "#e2ffda",
                        "outline": "#737970",
                        "surface-container-highest": "#eae1d7",
                        "on-primary-fixed-variant": "#304e2e",
                        "on-tertiary-fixed": "#2c1600",
                        "background": "#fff8f2",
                        "surface-tint": "#486644",
                        "primary-container": "#5a7956",
                        "surface-bright": "#fff8f2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-blur-circles {
            background-color: #fff8f2;
            position: relative;
            overflow: hidden;
        }
        .circle-1 {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, #42603f 0%, transparent 70%);
            top: -200px;
            left: -100px;
            opacity: 0.2;
            filter: blur(80px);
        }
        .circle-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, #caf24d 0%, transparent 70%);
            bottom: -150px;
            right: -100px;
            opacity: 0.15;
            filter: blur(100px);
        }
        .circle-3 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, #516600 0%, transparent 70%);
            top: 40%;
            right: 15%;
            opacity: 0.1;
            filter: blur(90px);
        }
    </style>
</head>
<body class="bg-blur-circles font-body text-on-surface h-screen flex items-center justify-center p-6">
<!-- Background Decor -->
<div class="circle-1"></div>
<div class="circle-2"></div>
<div class="circle-3"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-[480px]">
<!-- Centered Login Card -->
<div class="bg-surface/70 backdrop-blur-3xl rounded-xl p-10 shadow-[0_40px_60px_-15px_rgba(31,27,21,0.06)] flex flex-col items-center">
<!-- Logo Badge -->
<div class="mb-8 flex flex-col items-center gap-2">
<div class="w-16 h-16 bg-primary flex items-center justify-center rounded-xl rotate-3 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-3xl" data-icon="school">school</span>
</div>
<h2 class="text-2xl font-headline italic font-bold tracking-tighter text-primary mt-4">Ladder</h2>
<p class="text-[10px] uppercase tracking-[0.2em] font-semibold text-stone-400">College Prep</p>
</div>
<!-- Welcome Text -->
<div class="text-center mb-10">
<h1 class="text-4xl font-headline font-bold text-on-surface -tracking-widest">Welcome Back</h1>
<p class="text-stone-500 mt-2 text-sm">Continue your journey to higher education.</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-6">
<!-- Email Field -->
<div class="relative group">
<div class="absolute left-0 bottom-2.5 text-stone-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="envelope">mail</span>
</div>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/40 py-3 pl-8 focus:ring-0 focus:border-primary transition-all text-on-surface placeholder:text-stone-400" placeholder="Email Address" type="email"/>
<p class="text-[10px] uppercase tracking-wider font-bold text-stone-400 mt-1 opacity-0 group-focus-within:opacity-100 transition-opacity">Registered Email</p>
</div>
<!-- Password Field -->
<div class="relative group">
<div class="absolute left-0 bottom-2.5 text-stone-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="lock">lock</span>
</div>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/40 py-3 pl-8 pr-10 focus:ring-0 focus:border-primary transition-all text-on-surface placeholder:text-stone-400" placeholder="Password" type="password"/>
<button class="absolute right-0 bottom-2.5 text-stone-400 hover:text-primary" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="text-xs font-semibold text-primary/80 hover:text-primary underline decoration-secondary-fixed decoration-2 underline-offset-4 transition-all" href="#">Forgot Password?</a>
</div>
<!-- Log In Button -->
<button class="w-full py-4 rounded-xl bg-gradient-to-tr from-primary to-primary-container text-white font-bold text-sm tracking-wide shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                    Log In
                    <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="w-full flex items-center gap-4 my-8">
<div class="flex-1 h-[1px] bg-outline-variant/20"></div>
<span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">or connect with</span>
<div class="flex-1 h-[1px] bg-outline-variant/20"></div>
</div>
<!-- Social Logins -->
<div class="w-full flex gap-4">
<button class="flex-1 py-3 px-4 rounded-xl bg-surface-container-low border border-transparent hover:bg-surface-container-high transition-all flex items-center justify-center gap-3 group">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google G logo in multicolored clean vector style on a transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAAlWsxh2XSO0jEEnS3KEVNxi1Ow4h5ebE8uN8cqeL_FHjnPTWFiTWwyNXiCIfo1p2keGEJ6oTQ_FJOe5CSC52tFhQpGCxleA8I-BsROJyiD5fp7Uy2AShDqADJ0Mbheik29sGJfbpKpmhMq2GHASP54sZsYru1UaNTYqhTtq3vuPb2LhUUPRcy0dOVJMc56EbjZeszgIh_2TgnBajimgL84U-r6vl5GjUQlEy_6K3RVtrZtmfIhzDDXiNVaxPKDBSpCapm6A8z3XA"/>
<span class="text-xs font-bold text-on-surface group-hover:opacity-80">Google</span>
</button>
<button class="flex-1 py-3 px-4 rounded-xl bg-surface-container-low border border-transparent hover:bg-surface-container-high transition-all flex items-center justify-center gap-3 group">
<span class="material-symbols-outlined text-xl" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="text-xs font-bold text-on-surface group-hover:opacity-80">Apple</span>
</button>
</div>
<!-- Create Account -->
<div class="mt-10 flex flex-col items-center gap-4">
<p class="text-xs text-stone-500">New to the application?</p>
<a class="group flex items-center gap-2 px-6 py-2 rounded-full border border-outline-variant/30 hover:border-primary/40 transition-all" href="#">
<span class="text-xs font-bold text-primary">Create Account</span>
<span class="material-symbols-outlined text-sm text-primary group-hover:translate-x-1 transition-transform" data-icon="add">add</span>
</a>
</div>
</div>
<!-- Footer / Editorial Note -->
<footer class="mt-8 text-center flex flex-col items-center">
<div class="flex items-center gap-4 mb-4">
<span class="h-1 w-8 bg-secondary-fixed rounded-full shadow-[0_0_10px_rgba(202,242,77,0.5)]"></span>
<span class="text-[10px] font-bold uppercase tracking-[0.3em] text-stone-400">Elevating Ambition</span>
<span class="h-1 w-8 bg-secondary-fixed rounded-full shadow-[0_0_10px_rgba(202,242,77,0.5)]"></span>
</div>
<div class="flex gap-6">
<a class="text-[10px] text-stone-400 hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-[10px] text-stone-400 hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="text-[10px] text-stone-400 hover:text-primary transition-colors" href="#">Support</a>
</div>
</footer>
</main>
<!-- Visual Polish: Floating Element -->
<div class="fixed top-12 left-12 md:flex hidden flex-col items-start gap-1">
<span class="text-3xl font-headline italic font-bold text-primary tracking-tighter">Ladder</span>
<div class="h-0.5 w-12 bg-secondary-fixed"></div>
</div>
</body></html>
