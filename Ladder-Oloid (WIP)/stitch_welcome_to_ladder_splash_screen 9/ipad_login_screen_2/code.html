<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ladder - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-bright": "#fff8f2",
                    "primary-container": "#5a7956",
                    "on-secondary": "#ffffff",
                    "outline-variant": "#c3c8be",
                    "error": "#ba1a1a",
                    "on-primary-fixed-variant": "#304e2e",
                    "inverse-primary": "#aed0a7",
                    "on-error": "#ffffff",
                    "secondary-fixed": "#caf24d",
                    "surface-tint": "#486644",
                    "surface-container-high": "#efe7dd",
                    "secondary-fixed-dim": "#afd531",
                    "primary": "#42603f",
                    "inverse-surface": "#343029",
                    "surface-container-lowest": "#ffffff",
                    "on-surface": "#1f1b15",
                    "tertiary": "#725232",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed": "#052107",
                    "inverse-on-surface": "#f8efe5",
                    "tertiary-fixed": "#ffdcbd",
                    "surface-container-low": "#fbf2e8",
                    "on-background": "#1f1b15",
                    "on-surface-variant": "#434840",
                    "surface-variant": "#eae1d7",
                    "surface-container-highest": "#eae1d7",
                    "on-tertiary-fixed-variant": "#5e4122",
                    "primary-fixed": "#c9ecc2",
                    "surface-dim": "#e1d9cf",
                    "on-secondary-container": "#566c00",
                    "primary-fixed-dim": "#aed0a7",
                    "on-primary": "#ffffff",
                    "on-tertiary-container": "#fff5ee",
                    "outline": "#737970",
                    "on-secondary-fixed-variant": "#3c4d00",
                    "on-primary-container": "#e2ffda",
                    "secondary": "#516600",
                    "on-secondary-fixed": "#161e00",
                    "on-error-container": "#93000a",
                    "surface": "#fff8f2",
                    "on-tertiary-fixed": "#2c1600",
                    "error-container": "#ffdad6",
                    "secondary-container": "#caf24d",
                    "background": "#fff8f2",
                    "tertiary-fixed-dim": "#e9bf96",
                    "tertiary-container": "#8d6a48",
                    "surface-container": "#f5ede2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Noto Serif"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .glow-shadow {
            box-shadow: 0 10px 40px -10px rgba(202, 242, 77, 0.5);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface overflow-hidden">
<!-- Blurred Background Atmosphere -->
<div class="fixed inset-0 bg-gradient-to-br from-primary/10 via-surface to-surface-bright -z-10"></div>
<!-- Decorative Blurred Circles -->
<div class="fixed -top-24 -left-24 w-96 h-96 bg-secondary-fixed opacity-30 blur-[100px] rounded-full"></div>
<div class="fixed -bottom-48 -right-48 w-[500px] h-[500px] bg-secondary opacity-20 blur-[120px] rounded-full"></div>
<!-- Main Container -->
<main class="min-h-screen flex items-center justify-center p-6 lg:p-12">
<!-- Login Card -->
<div class="w-full max-w-[480px] bg-surface-container-lowest/80 backdrop-blur-3xl rounded-xl p-10 flex flex-col items-center gap-8 shadow-2xl shadow-on-surface/5">
<!-- Header Section -->
<div class="flex flex-col items-center gap-4">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center text-on-primary-container shadow-inner">
<span class="material-symbols-outlined text-4xl" data-icon="school">school</span>
</div>
<div class="text-center">
<h1 class="font-headline text-4xl font-bold tracking-tight text-primary">Welcome Back</h1>
<p class="text-on-surface-variant mt-2 text-sm">Please enter your credentials to continue your journey.</p>
</div>
</div>
<!-- Form Section -->
<form class="w-full space-y-6">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface-container-low border-b-2 border-outline-variant/40 focus:border-primary focus:ring-0 transition-all placeholder:text-outline/60 rounded-t-lg" placeholder="name@college.edu" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full h-[56px] pl-12 pr-12 bg-surface-container-low border-b-2 border-outline-variant/40 focus:border-primary focus:ring-0 transition-all placeholder:text-outline/60 rounded-t-lg" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 h-11 w-11 flex items-center justify-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="text-sm font-semibold text-primary hover:text-primary-container transition-colors mt-1" href="#">Forgot Password?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-secondary-fixed text-on-secondary-fixed font-bold rounded-xl glow-shadow hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                    Log In
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="w-full flex items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-xs font-medium text-outline uppercase tracking-widest">Or continue with</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Social Logins -->
<div class="w-full grid grid-cols-2 gap-4">
<button class="h-[56px] flex items-center justify-center gap-3 bg-surface-container-high hover:bg-surface-container-highest transition-colors rounded-xl border border-outline-variant/10">
<img alt="Google" class="w-5 h-5" color\"_logo.svg"="" data-alt="Official Google G logo in brand colors against a clean white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBP0jjz-g1RGezUG_TqrWMBcP-fXj3qaVz3oS-qEtk3vTvd6JfgNlS0r5LtuHLa4dwvcEGhR4Rbxcv0eWQVspUtgViKQwALZG17ZBTeBuMSont1oitLrbhg8WmEzhLap7CWNBxBT7yN_iwEZuTwIiOq9aq0srpvi9s0cWaWJ9PoEhmZ60I-0p0fjTEcKn6kIu5v64rZEjBMzHCj20Et2bBX7FXLlAk3tCYJ8fLhFGH3l975ICReZnwHBowcAbA1ubWX5GK1kjRGPsU"/>
<span class="font-semibold text-sm">Google</span>
</button>
<button class="h-[56px] flex items-center justify-center gap-3 bg-surface-container-high hover:bg-surface-container-highest transition-colors rounded-xl border border-outline-variant/10">
<span class="material-symbols-outlined text-2xl" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="font-semibold text-sm">Apple</span>
</button>
</div>
<!-- Footer Link -->
<div class="flex items-center gap-1.5 text-sm">
<span class="text-on-surface-variant">Don't have an account?</span>
<a class="font-bold text-primary hover:underline underline-offset-4 decoration-2 decoration-secondary-fixed" href="#">Create Account</a>
</div>
</div>
</main>
<!-- Background decorative textures -->
<div class="fixed bottom-12 left-12 opacity-40 pointer-events-none select-none">
<h2 class="font-headline text-8xl font-black text-primary/5 leading-none -rotate-12">LADDER</h2>
</div>
<!-- Subtle Grain Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] bg-[url('https://www.transparenttextures.com/patterns/p6.png')]"></div>
</body></html>
