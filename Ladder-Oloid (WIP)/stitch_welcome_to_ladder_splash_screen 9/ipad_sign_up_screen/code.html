        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background-color: #fff8f2;
            background-image: 
                radial-gradient(at 0% 0%, #c9ecc2 0px, transparent 50%),
                radial-gradient(at 100% 0%, #ffdcbd 0px, transparent 50%),
                radial-gradient(at 100% 100%, #caf24d33 0px, transparent 50%),
                radial-gradient(at 0% 100%, #5a795633 0px, transparent 50%);
        }
        .editorial-shadow {
            box-shadow: 0 40px 80px -20px rgba(31, 27, 21, 0.08);
        }
    </style>

<body class="bg-mesh min-h-screen flex items-center justify-center p-6 md:p-12 font-body selection:bg-secondary-fixed selection:text-on-secondary-fixed">
<!-- Auth Container -->
<main class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-12 bg-surface-container-lowest/80 backdrop-blur-3xl rounded-3xl overflow-hidden editorial-shadow">
<!-- Brand Visual Side (Left) -->
<div class="hidden md:flex md:col-span-5 relative flex-col justify-between p-10 bg-primary overflow-hidden">
<!-- Decorative Grain/Texture -->
<div class="absolute inset-0 opacity-10 pointer-events-none mix-blend-overlay bg-[url('https://www.transparenttextures.com/patterns/felt.png')]"></div>
<div class="relative z-10">
<div class="flex items-center gap-2 mb-12">
<span class="text-3xl font-headline italic font-bold text-secondary-fixed tracking-tighter">Ladder</span>
</div>
<h2 class="text-4xl lg:text-5xl font-headline font-bold text-surface leading-tight -tracking-[0.02em] italic">
                    The path to <br/>your future, <br/>refined.
                </h2>
<p class="mt-6 text-primary-fixed/80 text-sm leading-relaxed max-w-[240px]">
                    Join an elite community of students navigating the complexities of college admissions with editorial precision.
                </p>
</div>
<div class="relative z-10">
<div class="flex -space-x-3 mb-4">
<img class="w-10 h-10 rounded-full border-2 border-primary bg-surface-container" data-alt="portrait of a confident young female student in a library setting with soft natural light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaTUBMpvGvVulw8vV231iPXguT1sMoFvHAZnkA3om30ULHSSXNNf-ebHQVIwjOrzUlWIwm7W4aunkajKq1xEQtp63V6f9u3YsCBxPEskilglBnW78_IwEDmcr0ng0AdflHwuEYUQ21niNxJ-HOJ8cavbeNXAT9MZwnNxmQGZHwSA6I2zQSaWB7kadA_-hbR3uxYq1z_d3xZm5eiwKlXJmTjKsSS6czx6E5db_SEjgT602tbvAHsgMNrcefsaQmze7fQbfTKQKE1vo"/>
<img class="w-10 h-10 rounded-full border-2 border-primary bg-surface-container" data-alt="portrait of a young male student smiling in a modern campus environment during golden hour" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBWVseWAzx7b4IgYlAyojeITl_syb6YHesa4U6CD6fjF_TWfUxG47FWtFkBsQXBZNkWeGK29IV4W63nPJT3pKvQYmysBorHLfE-ysy5cLvs6Pde20foUw-3CPsKJpbswdasS61KfRMUJJaka259EYAq0Z9v6eh0vw0Q1KhypRbuoMtwjpcNg5aaL8V5nHcc6DX-tmumZXeXj2N4Ah3uQQ7FddrgkkUFQ1ZJVctrkxhxB8Gkn8hOjNxHW4qycLpFpobAosWw9IjuHr0"/>
<img class="w-10 h-10 rounded-full border-2 border-primary bg-surface-container" data-alt="close-up portrait of a thoughtful young person with diverse features in a soft-focus academic background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCh3yY5QXxCUGpJbPdevOJlh7VhhYCMHr6g0mPH7iXY0ejPx1tcdqD4uwF8yEgdJoNLeWRgrXCpJpojbKWkuJXLNa-X68AnTKbDxkf6WFtH0GBEbP-q4VrwiE8nXA-gEFW5EKkNwm6jVbmDhS8WO0kWUPXjIST5HuyHCJRu8mAE4ZJMd1_ep_3Q8kPz7yJr4JlOlL3sROvZlc0c1bf3beM1bxitI8dOoYrTRuZkJ0SnDcAAsJbocekL98wS1WhbEGg2yxviCCeHS9w"/>
</div>
<p class="text-xs text-primary-fixed-dim uppercase tracking-widest font-ui font-semibold">
                    12,000+ Students Already Enrolled
                </p>
</div>
<!-- Abstract Graphic -->
<div class="absolute -bottom-20 -right-20 w-64 h-64 bg-secondary-fixed/20 rounded-full blur-3xl"></div>
</div>
<!-- Form Side (Right) -->
<div class="col-span-1 md:col-span-7 p-8 md:p-14 flex flex-col justify-center">
<div class="max-w-md mx-auto w-full">
<header class="mb-10">
<h1 class="text-3xl font-headline font-bold text-on-surface mb-2 -tracking-[0.02em]">Create Account</h1>
<p class="text-on-surface-variant/70 text-sm font-medium">Begin your journey with the Academic Atelier.</p>
</header>
<form class="space-y-6">
<!-- Email -->
<div class="group">
<label class="block text-[10px] uppercase tracking-[0.15em] font-bold text-on-surface-variant/60 mb-2 font-ui" for="email">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/40 py-3 px-0 focus:ring-0 focus:border-primary transition-all text-on-surface placeholder:text-outline/40" id="email" name="email" placeholder="student@university.edu" type="email"/>
</div>
<!-- Password -->
<div>
<div class="group relative">
<label class="block text-[10px] uppercase tracking-[0.15em] font-bold text-on-surface-variant/60 mb-2 font-ui" for="password">Password</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/40 py-3 px-0 focus:ring-0 focus:border-primary transition-all text-on-surface placeholder:text-outline/40" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 bottom-3 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<!-- Strength Bar -->
<div class="mt-4 flex gap-1 items-center">
<div class="h-1 flex-1 bg-error rounded-full"></div>
<div class="h-1 flex-1 bg-secondary-fixed rounded-full"></div>
<div class="h-1 flex-1 bg-surface-container-highest rounded-full"></div>
<div class="h-1 flex-1 bg-surface-container-highest rounded-full"></div>
<span class="ml-3 text-[10px] font-bold font-ui text-secondary uppercase tracking-wider">Strong</span>
</div>
</div>
<!-- Confirm Password -->
<div class="group">
<label class="block text-[10px] uppercase tracking-[0.15em] font-bold text-on-surface-variant/60 mb-2 font-ui" for="confirm-password">Confirm Password</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/40 py-3 px-0 focus:ring-0 focus:border-primary transition-all text-on-surface placeholder:text-outline/40" id="confirm-password" name="confirm-password" placeholder="••••••••" type="password"/>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 py-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 text-primary border-outline-variant/60 rounded focus:ring-primary/20 bg-surface" id="terms" type="checkbox"/>
</div>
<label class="text-xs text-on-surface-variant/80 leading-relaxed" for="terms">
                            I agree to the <a class="text-primary font-bold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-bold hover:underline" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- Submit -->
<button class="w-full py-4 bg-gradient-to-r from-secondary-fixed to-secondary-fixed-dim text-on-secondary-fixed font-bold font-ui rounded-3xl shadow-lg shadow-secondary-fixed/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-10 text-center">
<p class="text-sm text-on-surface-variant/60">
                        Already have an account? 
                        <a class="text-primary font-extrabold hover:text-primary-container transition-colors ml-1" href="#">Log In</a>
</p>
</div>
</div>
</div>
</main>
<!-- Background Decoration Elements -->
<div class="fixed top-20 left-10 w-32 h-32 bg-primary/5 rounded-full blur-2xl pointer-events-none"></div>
<div class="fixed bottom-10 right-20 w-64 h-64 bg-secondary-fixed/5 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
