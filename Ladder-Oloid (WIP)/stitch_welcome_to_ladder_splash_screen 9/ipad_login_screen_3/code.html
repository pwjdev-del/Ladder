<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                      "on-secondary-container": "#566c00",
                      "secondary-fixed": "#caf24d",
                      "on-secondary-fixed": "#161e00",

                      "on-tertiary-fixed-variant": "#5e4122",
                      "inverse-surface": "#343029",
                      "secondary": "#516600",
                      "surface-bright": "#fff8f2",

                      "inverse-on-surface": "#f8efe5",

                      "tertiary-container": "#8d6a48",

                      "on-tertiary": "#ffffff",

              "fontFamily": {
                      "headline": ["Noto Serif"],
                      "body": ["Manrope"],
                      "label": ["Manrope"]

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #fff8f2;
        }
        .serif-italic {
            font-family: 'Noto Serif', serif;
            font-style: italic;
        }
        .glass-panel {
            background: rgba(234, 225, 215, 0.7);
            backdrop-filter: blur(24px);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #42603f 0%, #5a7956 100%);
        }
    </style>
</head>
<body class="min-h-screen overflow-hidden flex items-center justify-center p-8 bg-surface">
<div class="fixed inset-0 z-0 overflow-hidden primary-gradient">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-secondary-fixed opacity-20 rounded-full blur-[120px]"></div>
<div class="absolute top-[60%] -right-[10%] w-[50%] h-[50%] bg-secondary-fixed opacity-15 rounded-full blur-[140px]"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80%] h-[80%] bg-surface-container-highest opacity-5 rounded-full blur-[160px]"></div>
</div>
<main class="relative z-10 w-full max-w-[480px]">
<div class="bg-surface-container-low p-12 rounded-xl shadow-[0_40px_60px_rgba(31,27,21,0.06)] border border-outline-variant/10">
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-primary rotate-[15deg] rounded-xl flex items-center justify-center shadow-lg mb-8 transition-transform hover:rotate-0 duration-500">
<span class="material-symbols-outlined text-surface text-3xl -rotate-[15deg] transition-transform" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<h1 class="font-headline italic text-4xl font-bold text-on-surface tracking-tight mb-2">Welcome Back</h1>
<p class="text-on-surface-variant font-medium text-sm">Continue your academic journey at the Atelier.</p>
</div>
<form class="space-y-6" onsubmit="return false;">
<div class="space-y-1">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant/70 ml-1">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline text-xl transition-colors group-focus-within:text-primary">mail</span>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/40 py-3 pl-8 text-on-surface placeholder:text-outline-variant focus:ring-0 focus:border-primary transition-all text-sm" placeholder="student@university.edu" type="email"/>
</div>
</div>
<div class="space-y-1">
<div class="flex justify-between items-end">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant/70 ml-1">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline text-xl transition-colors group-focus-within:text-primary">lock</span>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/40 py-3 pl-8 text-on-surface placeholder:text-outline-variant focus:ring-0 focus:border-primary transition-all text-sm" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-4">
<button class="w-full h-14 bg-secondary-fixed text-on-secondary-fixed font-bold rounded-xl flex items-center justify-center gap-3 transition-all hover:brightness-105 active:scale-[0.98] shadow-sm">
<span>Log In</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</form>
<div class="relative my-10 flex items-center">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="px-4 text-[10px] font-bold uppercase tracking-[0.2em] text-outline">or connect via</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container-highest h-12 rounded-lg border border-outline-variant/5 hover:bg-surface-dim transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M17.05,20.28c-.96,.95-2.04,1.72-3.11,1.72-1.03,0-1.44-.61-2.61-.61s-1.63,.59-2.58,.61c-1.07,.02-2.22-.84-3.26-1.89C3.3,17.91,2,14.66,2,11.72c0-4.63,2.94-7.08,5.72-7.08,1.15,0,2.02,.38,2.71,.71,.59,.29,1.13,.54,1.86,.54s1.27-.25,1.86-.54c.69-.34,1.56-.71,2.71-.71,2.15,0,5.14,1.69,5.14,6.17-.03,2.83-1.83,6.23-4.95,9.47M12,4.61c.07-1.74,1.48-3.15,3.15-3.61,.05,1.75-1.42,3.22-3.15,3.61" fill="currentColor"></path>
</svg>
<span class="text-xs font-bold">Apple</span>
</button>
<button class="flex items-center justify-center gap-3 bg-surface-container-highest h-12 rounded-lg border border-outline-variant/5 hover:bg-surface-dim transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56,12.25c0-0.78-0.07-1.53-0.2-2.25H12v4.26h5.92c-0.26,1.37-1.04,2.53-2.21,3.31v2.77h3.57C21.35,18.41,22.56,15.62,22.56,12.25z" fill="#4285F4"></path>
<path d="M12,23c2.97,0,5.46-0.98,7.28-2.66l-3.57-2.77c-0.99,0.66-2.26,1.06-3.71,1.06c-2.86,0-5.29-1.93-6.16-4.53H2.18v2.84C3.99,20.53,7.7,23,12,23z" fill="#34A853"></path>
<path d="M5.84,14.09c-0.22-0.66-0.35-1.36-0.35-2.09s0.13-1.43,0.35-2.09V7.07H2.18C1.43,8.55,1,10.22,1,12s0.43,3.45,1.18,4.93L5.84,14.09z" fill="#FBBC05"></path>
<path d="M12,5.38c1.62,0,3.06,0.56,4.21,1.64l3.15-3.15C17.45,2.09,14.97,1,12,1C7.7,1,3.99,3.47,2.18,7.07l3.66,2.84C6.71,7.31,9.14,5.38,12,5.38z" fill="#EA4335"></path>
</svg>
<span class="text-xs font-bold">Google</span>
</button>
</div>
<div class="mt-12 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                    New to the Ladder? 
                    <a class="text-primary font-bold ml-1 relative inline-block group" href="#">
                        Create Account
                        <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-primary transition-all duration-300 group-hover:w-full"></span>
</a>
</p>
</div>
</div>
<div class="mt-8 flex justify-center gap-8 opacity-40">
<a class="text-[10px] font-bold uppercase tracking-[0.15em] text-on-primary hover:opacity-100 transition-opacity" href="#">Privacy Policy</a>
<a class="text-[10px] font-bold uppercase tracking-[0.15em] text-on-primary hover:opacity-100 transition-opacity" href="#">Terms of Service</a>
<a class="text-[10px] font-bold uppercase tracking-[0.15em] text-on-primary hover:opacity-100 transition-opacity" href="#">Support</a>
</div>
</main>
<div class="fixed bottom-12 right-12 z-0 opacity-10 pointer-events-none hidden lg:block">
<div class="font-headline italic text-8xl text-surface font-bold tracking-tighter select-none">
            Ladder
        </div>
</div>
</body></html>
