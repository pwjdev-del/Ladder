</div>
<div>
<span class="block font-bold text-on-surface">English</span>
<span class="text-xs text-stone-500">Standard Academic</span>
</div>
</div>
<input checked="" class="w-5 h-5 text-primary focus:ring-primary border-outline-variant bg-surface-container-lowest" name="language" type="radio" value="english"/>
</label>
<!-- Radio Option 2: Espanol -->
