<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Roommate Quiz - Ladder</title>

<style>
        body { font-family: 'Manrope', sans-serif; }
        .font-serif { font-family: 'Noto Serif', serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-shift-no-border {
            background-color: #fff8f2;
        }
        /* Custom pulses and refined states */
        .glow-dot {
            box-shadow: 0 0 12px rgba(81, 102, 0, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center">
<!-- Shared TopAppBar Component -->
<header class="w-full top-0 bg-[#fff8f2] dark:bg-stone-950 flex items-center justify-between px-6 py-4">
<button class="text-[#42603f] hover:bg-[#eae1d7] transition-colors p-2 rounded-full scale-95 duration-200">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-serif tracking-tight text-2xl text-[#42603f] dark:text-emerald-400">Roommate Quiz</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<main class="w-full max-w-md px-6 flex-1 flex flex-col">
<!-- Hero Section / Title Area -->
<section class="mt-4 mb-8">
<h2 class="font-serif text-3xl font-bold tracking-tight text-on-surface">Find Your Roommate</h2>
<p class="text-on-surface-variant mt-2 text-sm font-medium">Answer honestly — better matches come from honest answers</p>
</section>
<!-- Progress Tracker Section -->
<section class="mb-8">
<div class="flex justify-between items-end mb-3">
<span class="text-primary font-bold text-xs tracking-widest uppercase">Question 3 of 10</span>
<span class="text-on-surface-variant text-xs font-semibold">30% Complete</span>
</div>
<div class="h-3 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary-container transition-all duration-500 rounded-full" style="width: 30%"></div>
</div>
</section>
<!-- Question Card -->
<div class="bg-surface-container-low rounded-xl p-6 shadow-sm border-0 relative overflow-hidden flex-1 mb-8">
<!-- Icon Decoration -->
<div class="flex justify-start mb-6">
<div class="w-12 h-12 bg-primary-container flex items-center justify-center rounded-full text-on-primary-container">
<span class="material-symbols-outlined">nights_stay</span>
</div>
</div>
<h3 class="font-serif text-2xl text-on-surface mb-8 leading-tight">What's your sleep schedule?</h3>
<!-- Options Stack -->
<div class="space-y-4">
<!-- Option 1: Selected State -->
<button class="w-full flex items-center p-4 rounded-xl bg-primary/5 border-l-4 border-primary text-left transition-all hover:bg-primary/10">
<span class="text-lg mr-3">🌙</span>
<span class="font-semibold text-on-surface">Night Owl — I'm most productive after 10pm</span>
</button>
<!-- Option 2 -->
<button class="w-full flex items-center p-4 rounded-xl bg-surface-container-highest text-left transition-all hover:bg-surface-container-high">
<span class="text-lg mr-3">☀️</span>
<span class="font-medium text-on-surface-variant">Early Bird — I'm up before 7am naturally</span>
</button>
<!-- Option 3 -->
<button class="w-full flex items-center p-4 rounded-xl bg-surface-container-highest text-left transition-all hover:bg-surface-container-high">
<span class="text-lg mr-3">🔄</span>
<span class="font-medium text-on-surface-variant">Flexible — I adapt to whatever works</span>
</button>
<!-- Option 4 -->
<button class="w-full flex items-center p-4 rounded-xl bg-surface-container-highest text-left transition-all hover:bg-surface-container-high">
<span class="text-lg mr-3">📚</span>
<span class="font-medium text-on-surface-variant">Varies — Depends on exams and deadlines</span>
</button>
</div>
</div>
<!-- Category Progress Chips (The Ladder Tracker) -->
<section class="mb-10 overflow-x-auto no-scrollbar">
<div class="flex items-center gap-6 min-w-max px-2">
<!-- Completed -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">bedtime</span>
</div>
<span class="text-[10px] font-bold text-primary">Sleep</span>
</div>
<div class="w-4 h-0.5 bg-primary-container rounded-full opacity-30"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">cleaning_services</span>
</div>
<span class="text-[10px] font-bold text-primary">Clean</span>
</div>
<div class="w-4 h-0.5 bg-primary-container rounded-full opacity-30"></div>
<!-- Current -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container glow-dot">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">volume_up</span>
</div>
<span class="text-[10px] font-bold text-on-surface">Noise</span>
</div>
<div class="w-4 h-0.5 bg-outline-variant rounded-full opacity-30"></div>
<!-- Upcoming -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-outline">
<span class="material-symbols-outlined text-sm">groups</span>
</div>
<span class="text-[10px] font-bold text-outline">Social</span>
</div>
<div class="w-4 h-0.5 bg-outline-variant rounded-full opacity-30"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-outline">
<span class="material-symbols-outlined text-sm">menu_book</span>
</div>
<span class="text-[10px] font-bold text-outline">Study</span>
</div>
<div class="w-4 h-0.5 bg-outline-variant rounded-full opacity-30"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-outline">
<span class="material-symbols-outlined text-sm">ac_unit</span>
</div>
<span class="text-[10px] font-bold text-outline">Temp</span>
</div>
</div>
</section>
</main>
<!-- Bottom Action Area -->
<footer class="w-full max-w-md p-6 bg-surface/80 backdrop-blur-xl sticky bottom-0">
<button class="w-full bg-primary-container text-on-primary-container font-bold py-5 px-8 rounded-xl flex items-center justify-center gap-3 transition-transform active:scale-95 shadow-lg shadow-primary/10">
<span class="text-lg">Next Question</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</footer>
<!-- Imagery Placeholder (Floating Background Texture) -->
<div class="fixed top-20 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none -z-10"></div>
<div class="fixed bottom-40 -left-20 w-80 h-80 bg-secondary/5 rounded-full blur-3xl pointer-events-none -z-10"></div>
</body></html>
