<body class="bg-background text-on-background font-body min-h-screen antialiased flex flex-col items-center justify-center p-6 md:p-12 relative overflow-hidden">
<!-- Ambient background layer -->
<div class="absolute top-0 right-0 w-full h-full pointer-events-none opacity-40 mix-blend-multiply overflow-hidden -z-10">
<div class="absolute -top-32 -right-32 w-96 h-96 bg-primary-container rounded-full blur-[100px] opacity-20"></div>
<div class="absolute -bottom-32 -left-32 w-96 h-96 bg-tertiary-container rounded-full blur-[100px] opacity-20"></div>

<!-- TopAppBar (Transactional - Close Action) -->
<header class="flex justify-between items-center w-full px-6 py-4 bg-surface-container-lowest/70 backdrop-blur-xl sticky top-0 z-20">
<button aria-label="Close" class="text-on-surface-variant hover:bg-surface-container hover:text-on-surface p-2 rounded-full transition-colors active:scale-95 flex items-center justify-center w-10 h-10 group">

<div class="px-8 pb-12 pt-4">

<div class="mb-8 w-full h-48 bg-surface-container-low rounded-[1.5rem] overflow-hidden relative group">
<img alt="Soft sunlight filtering through deep green forest leaves" class="w-full h-full object-cover mix-blend-luminosity opacity-80 group-hover:scale-105 transition-transform duration-700 ease-out" data-alt="Soft sunlight filtering through deep green forest leaves creating a calm, natural, and grounded atmosphere, cinematic lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBnL00IEb4347CdZQUvc1ySF2qJJsgjNH4OG0uoAm9x9VWJzpqiutsKoiXujeruAHh38mQX0xswGPxFKlrdmUtJk8HBywNukGszfA9h-68Tq23qerVJvPxi3QpiFEy2nts1ROa45ZjLvUHJcZGBbRGTtfG8Pn1Tw-JlqGw_pgcAe0jd40iZf-_jUxcHcTiPheRbLtSQlYcUdFWEz00RvF9oEToNvmOF8zz8sf0rLzNtPNkTi8fytOyDO8ZogKXFXMMFgCdo-xXIKOE"/>

<span class="font-label text-sm font-semibold tracking-wide text-on-surface">Grow Together</span>
</div>
</div>
<!-- Typography Header -->
<div class="mb-8 pl-2 pr-6">
<h1 class="font-headline text-4xl font-bold text-on-surface leading-tight tracking-[-0.02em] mb-4">
                    Add a<br/><span class="text-primary italic">grown-up.</span>
</h1>
<p class="font-body text-on-surface-variant text-base leading-relaxed max-w-[280px]">
                    Your parent or guardian can watch your progress and help with big decisions.
                </p>
</div>
<!-- Form Area -->
<form class="space-y-8 pl-2">
<!-- Email Input -->
<div class="relative group">
<input class="block w-full px-0 pb-3 pt-5 text-on-surface bg-transparent border-0 border-b border-outline-variant/40 appearance-none focus:outline-none focus:ring-0 focus:border-primary peer font-body text-lg transition-colors" id="parentEmail" placeholder=" " required="" type="email"/>
<label class="absolute font-label text-on-surface-variant duration-300 transform -translate-y-4 scale-75 top-4 -z-10 origin-[0] peer-focus:text-primary peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-4" for="parentEmail">Grown-up's email</label>
<div class="absolute right-0 top-4 text-outline-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="mail">mail</span>
</div>
</div>
<!-- Relationship Segmented Control -->
<div class="space-y-3">
<label class="block font-label text-sm text-tertiary font-medium">Relationship</label>
<div class="flex flex-wrap gap-3">
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="relationship" type="radio" value="parent"/>
<div class="px-5 py-2.5 rounded-full font-label text-sm font-medium transition-all duration-200 bg-surface-container-high text-on-surface-variant peer-checked:bg-primary peer-checked:text-on-primary hover:bg-surface-dim peer-checked:hover:bg-primary-container shadow-sm peer-checked:shadow-[0_8px_16px_-4px_rgba(66,96,63,0.3)]">
                                Parent
                            </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="relationship" type="radio" value="guardian"/>
<div class="px-5 py-2.5 rounded-full font-label text-sm font-medium transition-all duration-200 bg-surface-container-high text-on-surface-variant peer-checked:bg-primary peer-checked:text-on-primary hover:bg-surface-dim peer-checked:hover:bg-primary-container shadow-sm peer-checked:shadow-[0_8px_16px_-4px_rgba(66,96,63,0.3)]">
                                Guardian
                            </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="relationship" type="radio" value="other"/>
<div class="px-5 py-2.5 rounded-full font-label text-sm font-medium transition-all duration-200 bg-surface-container-high text-on-surface-variant peer-checked:bg-primary peer-checked:text-on-primary hover:bg-surface-dim peer-checked:hover:bg-primary-container shadow-sm peer-checked:shadow-[0_8px_16px_-4px_rgba(66,96,63,0.3)]">

                            </div>
</label>
</div>
</div>

<button class="w-full relative overflow-hidden rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-label font-bold text-lg py-4 px-6 flex items-center justify-center gap-2 group transition-all hover:shadow-[0_20px_40px_-10px_rgba(66,96,63,0.4)] active:scale-[0.98]" type="submit">
<span class="relative z-10">Send invite</span>
<span class="material-symbols-outlined text-secondary-fixed relative z-10 group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
