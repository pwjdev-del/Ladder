<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ladder · Founder Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&amp;family=Noto+Serif:ital,wght@0,600;0,700;1,600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f3fceb",
                        "primary-fixed": "#caecc4",
                        "on-primary-fixed": "#052108",
                        "on-primary-fixed-variant": "#314d30",
                        "on-primary-container": "#d0f2ca",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#151f00",
                        "error-container": "#ffdad6",
                        "secondary": "#4e6700",
                        "tertiary-container": "#54704e",
                        "tertiary-fixed-dim": "#b0cfa7",
                        "on-secondary-fixed-variant": "#3a4d00",
                        "surface-dim": "#d3ddcc",
                        "inverse-surface": "#2a3327",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#d2f2c8",
                        "on-error-container": "#93000a",
                        "tertiary": "#3d5738",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#dce6d4",
                        "primary": "#3a5739",
                        "on-surface": "#161e13",
                        "surface": "#f3fceb",
                        "inverse-on-surface": "#eaf4e2",
                        "surface-bright": "#f3fceb",
                        "surface-container-high": "#e2ebda",
                        "on-background": "#161e13",
                        "on-secondary-container": "#536d00",
                        "surface-container-low": "#edf7e5",
                        "on-error": "#ffffff",
                        "outline-variant": "#c3c8be",
                        "on-tertiary-fixed-variant": "#334d2e",
                        "primary-container": "#527050",
                        "secondary-fixed-dim": "#abd537",
                        "surface-variant": "#dce6d4",
                        "surface-container": "#e7f1df",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#434841",
                        "secondary-fixed": "#c6f252",
                        "primary-fixed-dim": "#aecfa9",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ccebc1",
                        "surface-tint": "#486646",
                        "inverse-primary": "#aecfa9",
                        "on-tertiary-fixed": "#072107",
                        "secondary-container": "#c6f252",
                        "outline": "#737970"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#3F5A3A] min-h-screen flex flex-col items-center justify-center font-body relative overflow-hidden">
<!-- Background Texture -->
<div aria-hidden="true" class="absolute inset-0 bg-gradient-to-br from-[#3F5A3A] to-[#527050] opacity-80 pointer-events-none"></div>
<main class="w-full max-w-md px-6 relative z-10 flex flex-col items-center">
<!-- Header Label -->
<div class="mb-12 text-center">
<h1 class="font-label text-[11pt] font-semibold tracking-[10%] text-[#E8E2D8] uppercase">
                LADDER · FOUNDER
            </h1>
</div>
<!-- Login Card -->
<div class="w-full bg-[#527050] rounded-[24pt] p-10 shadow-[0_24px_48px_rgba(0,0,0,0.12)] border border-[#c3c8be]/10 backdrop-blur-sm">
<form action="#" class="space-y-6" method="POST">
<!-- Founder ID -->
<div class="space-y-2">
<label class="block font-label text-[11pt] font-semibold tracking-[10%] text-[#E8E2D8] uppercase" for="founder_id">
                        Founder ID
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#8A9082] pointer-events-none text-[20px]" data-icon="badge">badge</span>
<input class="w-full bg-[#E8E2D8] border-none rounded-xl py-3 pl-10 pr-4 text-[#1B1F1B] font-mono placeholder:text-[#8A9082] focus:ring-2 focus:ring-[#CCE68A] focus:outline-none transition-shadow" id="founder_id" name="founder_id" placeholder="FND-0000" required="" type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="block font-label text-[11pt] font-semibold tracking-[10%] text-[#E8E2D8] uppercase" for="password">
                        Password
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#8A9082] pointer-events-none text-[20px]" data-icon="key">key</span>
<input class="w-full bg-[#E8E2D8] border-none rounded-xl py-3 pl-10 pr-4 text-[#1B1F1B] font-mono placeholder:text-[#8A9082] focus:ring-2 focus:ring-[#CCE68A] focus:outline-none transition-shadow" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<!-- TOTP Code -->
<div class="space-y-2">
<label class="block font-label text-[11pt] font-semibold tracking-[10%] text-[#E8E2D8] uppercase" for="totp">
                        TOTP Code
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#8A9082] pointer-events-none text-[20px]" data-icon="lock_clock">lock_clock</span>
<input class="w-full bg-[#E8E2D8] border-none rounded-xl py-3 pl-10 pr-4 text-[#1B1F1B] font-mono tracking-widest placeholder:text-[#8A9082] focus:ring-2 focus:ring-[#CCE68A] focus:outline-none transition-shadow text-center" id="totp" maxlength="6" name="totp" pattern="[0-9]{6}" placeholder="000000" required="" type="text"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-[#A8D234] text-[#1B1F1B] font-body font-semibold py-3 px-6 rounded-full hover:shadow-[0_0_0_4px_rgba(204,230,138,0.5)] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
<span>Enter</span>
<span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>
</button>
</div>
</form>
</div>
<!-- Helper Strip -->
<div class="mt-8 text-center max-w-xs">
<p class="font-body text-[#8A9082] text-xs leading-relaxed">
                This surface does not render tenant data.<br/>Every action is audited.
            </p>
</div>
</main>
</body></html>
