<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ladder - Create Your Account</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400;1,700&amp;display=swap" rel="stylesheet"/>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f3fceb",
                        "primary-fixed": "#caecc4",
                        "on-primary-fixed": "#052108",
                        "on-primary-fixed-variant": "#314d30",
                        "on-primary-container": "#d0f2ca",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#151f00",
                        "error-container": "#ffdad6",
                        "secondary": "#4e6700",
                        "tertiary-container": "#54704e",
                        "tertiary-fixed-dim": "#b0cfa7",
                        "on-secondary-fixed-variant": "#3a4d00",
                        "surface-dim": "#d3ddcc",
                        "inverse-surface": "#2a3327",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#d2f2c8",
                        "on-error-container": "#93000a",
                        "tertiary": "#3d5738",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#dce6d4",
                        "primary": "#3a5739",
                        "on-surface": "#161e13",
                        "surface": "#f3fceb",
                        "inverse-on-surface": "#eaf4e2",
                        "surface-bright": "#f3fceb",
                        "surface-container-high": "#e2ebda",
                        "on-background": "#161e13",
                        "on-secondary-container": "#536d00",
                        "surface-container-low": "#edf7e5",
                        "on-error": "#ffffff",
                        "outline-variant": "#c3c8be",
                        "on-tertiary-fixed-variant": "#334d2e",
                        "primary-container": "#527050",
                        "secondary-fixed-dim": "#abd537",
                        "surface-variant": "#dce6d4",
                        "surface-container": "#e7f1df",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#434841",
                        "secondary-fixed": "#c6f252",
                        "primary-fixed-dim": "#aecfa9",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ccebc1",
                        "surface-tint": "#486646",
                        "inverse-primary": "#aecfa9",
                        "on-tertiary-fixed": "#072107",
                        "secondary-container": "#c6f252",
                        "outline": "#737970"

                    "borderRadius": {

                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]

                }
            }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body antialiased selection:bg-secondary-container selection:text-on-surface min-h-screen flex">
<!-- Asymmetrical Layout: Image Side (Hidden on Mobile) -->
<div class="hidden lg:block lg:w-5/12 relative overflow-hidden bg-primary-container">
<div class="absolute inset-0 bg-gradient-to-br from-primary-container/40 to-background/90 mix-blend-multiply z-10"></div>
<img alt="Decorative background" class="absolute inset-0 w-full h-full object-cover object-center" data-alt="sunlight filtering through ancient mossy oak trees in a quiet botanical conservatory, soft glowing green atmosphere, high end photography" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsPc-Mr1NKWsoGqXM3tfs8SUXLfK-HGeBWK6PSBV89SqvyrNEkYxPK9KW0zQshAj_gCVOhWJ3INA5w20fa9KLLN5Rxh3AoinXv2mEaOofX3olJ1Q1TbEzi0X2Vg5IGeuZvsLBMFGPncn6KRboMNpW8Ub__jJAtFWCOQgcQtRl94xPvAeAC613PPVwWwUn6mka87HOlTMXxHpfkRO92RvfvZCq4CMjGct7uLgFyOeSoGO2xUZqvQwwHVZIgIaosBKOA0PGFe9InhRo"/>
<!-- Brand Floating Badge -->
<div class="absolute top-12 left-12 z-20">
<span class="font-headline italic font-bold text-3xl text-surface-container-lowest drop-shadow-md">Ladder</span>
</div>
</div>
<!-- Layout: Form Side -->
<div class="w-full lg:w-7/12 flex flex-col justify-center items-center p-6 sm:p-12 md:p-16 relative overflow-y-auto">
<!-- Mobile Brand (Visible only when image side is hidden) -->
<div class="lg:hidden w-full max-w-md mb-12">
<span class="font-headline italic font-bold text-3xl text-primary">Ladder</span>
</div>
<main class="w-full max-w-md">
<!-- Headline -->
<header class="mb-10">
<h1 class="font-headline text-4xl font-semibold tracking-[-0.02em] text-on-surface">Create your account</h1>
</header>
<form class="space-y-8">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-[11px] uppercase tracking-[0.1em] font-semibold text-on-surface-variant">Email</label>
<div class="relative">
<input class="w-full bg-surface-container rounded-lg px-4 py-3.5 text-on-surface placeholder:text-outline border-none outline-none focus:ring-2 focus:ring-secondary-container focus:bg-surface-container-lowest transition-all shadow-[0_2px_8px_rgba(0,0,0,0.02)]" placeholder="student@example.com" type="email"/>
</div>
</div>
<!-- Password Field with Strength -->
<div class="space-y-2">
<label class="font-label text-[11px] uppercase tracking-[0.1em] font-semibold text-on-surface-variant">Password</label>
<div class="relative mb-3">
<input class="w-full bg-surface-container rounded-lg px-4 py-3.5 text-on-surface placeholder:text-outline border-none outline-none focus:ring-2 focus:ring-secondary-container focus:bg-surface-container-lowest transition-all shadow-[0_2px_8px_rgba(0,0,0,0.02)]" placeholder="••••••••" type="password"/>
</div>
<!-- Strength Indicators -->
<div class="flex items-center gap-2 px-1">
<div class="h-1.5 flex-1 rounded-full bg-secondary-container"></div>
<div class="h-1.5 flex-1 rounded-full bg-secondary-container"></div>
<div class="h-1.5 flex-1 rounded-full bg-outline-variant/40"></div>
<div class="h-1.5 flex-1 rounded-full bg-outline-variant/40"></div>
<span class="text-[11px] font-medium text-on-surface-variant ml-2">Fair</span>
</div>
</div>
<!-- DOB Date Wheel -->
<div class="space-y-2">
<label class="font-label text-[11px] uppercase tracking-[0.1em] font-semibold text-on-surface-variant">Date of Birth</label>
<div class="flex gap-3">
<div class="relative flex-[2]">
<select class="w-full appearance-none bg-surface-container rounded-lg px-4 py-3.5 text-on-surface border-none outline-none focus:ring-2 focus:ring-secondary-container focus:bg-surface-container-lowest transition-all shadow-[0_2px_8px_rgba(0,0,0,0.02)] font-medium cursor-pointer">
<option disabled="">Month</option>
<option>January</option>
<option>February</option>
<option selected="">August</option>
<option>September</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none text-xl">expand_more</span>
</div>
<div class="relative flex-1">
<select class="w-full appearance-none bg-surface-container rounded-lg px-4 py-3.5 text-on-surface border-none outline-none focus:ring-2 focus:ring-secondary-container focus:bg-surface-container-lowest transition-all shadow-[0_2px_8px_rgba(0,0,0,0.02)] font-medium cursor-pointer text-center pl-2">
<option disabled="">Day</option>
<option>13</option>
<option selected="">14</option>
<option>15</option>
</select>
</div>
<div class="relative flex-1">
<select class="w-full appearance-none bg-surface-container rounded-lg px-4 py-3.5 text-on-surface border-none outline-none focus:ring-2 focus:ring-secondary-container focus:bg-surface-container-lowest transition-all shadow-[0_2px_8px_rgba(0,0,0,0.02)] font-medium cursor-pointer text-center pl-2">
<option disabled="">Year</option>
<option>2013</option>
<option selected="">2014</option>
<option>2015</option>
</select>
</div>
</div>
</div>
<!-- COPPA Inline Card (Conditional based on 2014 DOB) -->
<div class="bg-surface-container-lowest border-l-[4px] border-secondary-container p-5 rounded-r-xl shadow-[0_8px_24px_rgba(0,0,0,0.04)] mt-2 flex gap-4 items-start relative overflow-hidden">
<span class="material-symbols-outlined text-tertiary-container mt-0.5 text-[28px]" style="font-variation-settings: 'FILL' 1;">escalator_warning</span>
<p class="text-[15px] leading-relaxed text-on-surface font-medium pr-2">
                        Because you're under 13, a grown-up needs to say it's OK. We'll ask for their email after you sign up.
                    </p>
</div>
<!-- Agreements -->
<div class="space-y-3 pt-4">
<!-- Toggle Row 1 -->
<label class="flex items-center justify-between p-4 bg-surface-container-lowest shadow-[0_4px_16px_rgba(0,0,0,0.02)] rounded-xl cursor-pointer hover:bg-surface-container-low transition-colors">
<span class="text-[15px] font-medium text-on-surface select-none">I have read and accept the Terms</span>
<div class="relative">
<input class="sr-only peer" type="checkbox"/>
<div class="w-12 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-surface-container-lowest after:border-outline-variant after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-secondary-container shadow-inner"></div>
</div>
</label>
<!-- Toggle Row 2 -->
<label class="flex items-center justify-between p-4 bg-surface-container-lowest shadow-[0_4px_16px_rgba(0,0,0,0.02)] rounded-xl cursor-pointer hover:bg-surface-container-low transition-colors">
<span class="text-[15px] font-medium text-on-surface select-none">Privacy Notice</span>
<div class="relative">
<!-- Pre-checked for visual variety in demo -->
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-12 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-on-surface after:border-outline-variant after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-secondary-container shadow-inner"></div>
</div>
</label>
</div>
<!-- Primary Action -->
<div class="pt-6">
<!-- Disabled State representation -->
<button class="w-full bg-surface-variant text-outline font-semibold py-4 rounded-full opacity-70 cursor-not-allowed transition-all text-lg tracking-wide" disabled="" type="button">
                        Create account
                    </button>
<!-- Note: For active state, use: bg-secondary-container text-on-surface hover:shadow-[0_0_0_4px_rgba(204,230,138,0.4)] cursor-pointer -->
</div>
</form>
</main>
</div>
</body></html>
