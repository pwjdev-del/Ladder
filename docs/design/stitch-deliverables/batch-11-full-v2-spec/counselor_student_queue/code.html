<body class="bg-background text-on-background font-body min-h-screen flex flex-col">

<button class="bg-primary text-on-primary rounded-full px-5 py-2 font-label text-sm font-semibold whitespace-nowrap shadow-[0_4px_12px_rgba(31,27,21,0.06)]">

<button class="bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest rounded-full px-5 py-2 font-label text-sm font-semibold whitespace-nowrap transition-colors">

            </button>
<button class="bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest rounded-full px-5 py-2 font-label text-sm font-semibold whitespace-nowrap transition-colors">
                Approved today

</div>
<!-- Queue List -->
<div class="flex flex-col gap-3">
<!-- List Item 1: Conflict -->
<div class="bg-surface-container-low rounded-xl h-[64px] flex items-center px-4 shadow-[0_4px_12px_rgba(31,27,21,0.02)] hover:bg-surface-container-highest transition-colors cursor-pointer group relative">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-error rounded-l-xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-primary font-bold font-headline mr-4">
                    EB
                </div>
<div class="flex-grow flex flex-col justify-center">
<span class="font-body font-semibold text-on-surface text-sm">Eleanor Bennett</span>
<span class="font-label text-xs text-on-surface-variant tracking-wider">GRADE 5</span>
</div>
<div class="flex items-center gap-3">
<div class="w-2.5 h-2.5 rounded-full bg-error"></div>
<span class="font-label text-xs text-on-surface-variant w-12 text-right">2m ago</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
</div>
<!-- List Item 2: Clear -->
<div class="bg-surface-container-low rounded-xl h-[64px] flex items-center px-4 shadow-[0_4px_12px_rgba(31,27,21,0.02)] hover:bg-surface-container-highest transition-colors cursor-pointer group">

</div>
<div class="flex items-center gap-3">
<div class="w-2.5 h-2.5 rounded-full bg-primary-container"></div>
<span class="font-label text-xs text-on-surface-variant w-12 text-right">15m ago</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>

<span class="font-body font-semibold text-on-surface text-sm">Sophia Anderson</span>

<div class="flex items-center gap-3">
