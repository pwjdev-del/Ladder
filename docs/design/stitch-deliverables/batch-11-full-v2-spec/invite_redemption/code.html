<body class="bg-background min-h-screen flex flex-col font-body text-on-surface antialiased">
<!-- TopAppBar Header Strip (Forest-700) -->
<header class="bg-forest-700 w-full h-16 flex items-center px-6 shadow-[0_4px_20px_rgba(0,0,0,0.08)] z-10 sticky top-0 shrink-0">
<div class="flex items-center gap-3">
<span class="font-headline text-2xl font-bold italic text-paper">Ladder</span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex items-center justify-center p-4 md:p-8 bg-gradient-to-br from-background to-surface-container-low">
<!-- Redemption Card -->
<div class="w-full max-w-md bg-paper rounded-[24px] shadow-[0_12px_32px_rgba(0,0,0,0.04)] p-8 relative overflow-hidden border border-outline-variant/15">
<!-- Default State: Redeem Form -->
<div class="flex flex-col gap-8">
<div class="text-center">
<h1 class="font-headline text-3xl font-semibold tracking-[-0.02em] text-ink-900 mb-2">Join Your School</h1>
<p class="font-body text-base text-ink-600">Enter your details to redeem your invitation.</p>
</div>
<!-- Error Band (Hidden by default, displayed for dev reference) -->
<!-- <div class="bg-[#FFF4E5] border border-[#FFDDAA] rounded-xl p-4 flex gap-3 items-start">
                    <span class="material-symbols-outlined text-[#B36B00] shrink-0 mt-0.5" data-weight="fill" data-icon="error">error</span>
                    <p class="font-body text-sm text-[#804D00] leading-tight">We couldn't use that code. Ask your counselor to issue a new one.</p>
                </div> -->
<form class="flex flex-col gap-5">
<!-- Code Prefix Row -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-[11pt] font-semibold uppercase tracking-[0.1em] text-ink-600" for="invite-code">Invite Code</label>
<div class="flex items-center gap-2 w-full p-4 rounded-xl bg-stone-200 border border-outline-variant/20 focus-within:ring-2 focus-within:ring-lime-300 focus-within:border-transparent transition-all">
<span class="font-body text-ink-900 font-medium whitespace-nowrap">LDR-X</span>
<input aria-label="Invite Code" class="bg-transparent border-none w-full text-ink-900 font-body placeholder-ink-400 focus:ring-0 p-0 text-lg tracking-widest" id="invite-code" name="invite-code" placeholder="••••••••" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label text-[11pt] font-semibold uppercase tracking-[0.1em] text-ink-600" for="school-email">Your school email</label>
<input class="w-full p-4 rounded-xl bg-stone-200 border border-outline-variant/20 focus:ring-2 focus:ring-lime-300 focus:border-transparent font-body text-ink-900 placeholder-ink-400 transition-all" id="school-email" name="school-email" placeholder="student@lakewood.edu" type="email"/>
</div>
<!-- Submit Button -->
<button class="mt-4 w-full bg-lime-500 text-ink-900 font-body font-semibold text-lg py-4 px-6 rounded-full hover:bg-lime-300 hover:shadow-[0_0_0_4px_rgba(204,230,138,0.4)] transition-all flex items-center justify-center gap-2" type="button">
<span>Join</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<p class="text-center font-body text-sm text-ink-400 mt-2">
                    Need help? <a class="text-forest-700 font-semibold hover:text-forest-900 transition-colors underline decoration-forest-700/30 underline-offset-4" href="#">Contact your counselor</a>
</p>
</div>
