<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center antialiased">
<div class="w-full max-w-md bg-surface-container-lowest rounded-2xl overflow-hidden shadow-[0_8px_24px_rgba(0,0,0,0.04)] sm:mx-4 relative z-10">
<!-- Hero Strip -->
<div class="h-[120px] bg-primary-container relative flex flex-col items-center justify-center p-6 text-center">
<!-- Subtle Texture Gradient -->
<div class="absolute inset-0 bg-gradient-to-br from-primary-container to-primary opacity-80" style="mix-blend-mode: multiply;"></div>
<div class="relative z-10 flex flex-col items-center">
<div class="w-[60px] h-[60px] bg-surface-container-lowest rounded-full flex items-center justify-center shadow-sm mb-3">
<img alt="Lakewood Ranch Preparatory Academy Crest" class="w-[48px] h-[48px] object-contain" data-alt="classic academic crest or shield logo with traditional elements like an open book or tree, elegant design" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3VJgUs26gqZGD_tvXeDn852xLjiuwMUkuwCITISzgjU2QUIMSNmUFivym-ce2DpQmFC-AUaIF-s0pi9Cb7cm-38R8ym4-1Se_69yTyrvzoDAIumuozOBnyJzgFM7KlQ7xHTymK-ICO3l81-jK6YKjY57W14etdTv1UPX80kPsI3yqy7mMo_MZwcxv8e_egylFsIR8J9bxaDh1R96t45a1Popo6GAV-DuLaD4eY_A9nKHXQQFvuH4i7ylI_J9KQxU0YzVIJd1s7zg"/>
</div>
<h1 class="font-headline font-bold text-xl text-on-primary tracking-tight text-shadow-soft">The Scholastic Sanctuary</h1>
</div>
</div>
<!-- Main Content Body -->
<div class="p-8 pb-10 bg-[#F5F0E5]">
<div class="text-center mb-8">
<h2 class="font-headline font-semibold text-2xl text-on-surface mb-2 tracking-tight">Sign in</h2>
<p class="text-on-surface-variant text-sm">Welcome back to Lakewood Ranch.</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-5" method="POST">
<div>
<label class="block text-[11px] font-label font-semibold text-on-surface uppercase tracking-[0.1em] mb-1" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border-transparent rounded-lg bg-[#E8E2D8] text-on-surface placeholder-on-surface-variant/50 focus:ring-0 focus:border-transparent focus:shadow-[0_0_0_2px_#CCE68A] sm:text-sm transition-shadow" id="email" name="email" placeholder="student@lrpa.edu" type="email"/>
</div>
</div>
<div>
<label class="block text-[11px] font-label font-semibold text-on-surface uppercase tracking-[0.1em] mb-1" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border-transparent rounded-lg bg-[#E8E2D8] text-on-surface placeholder-on-surface-variant/50 focus:ring-0 focus:border-transparent focus:shadow-[0_0_0_2px_#CCE68A] sm:text-sm transition-shadow" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-2">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-full shadow-sm text-sm font-semibold text-[#1B1F1B] bg-[#A8D234] hover:shadow-[0_0_0_4px_#CCE68A] focus:outline-none transition-all duration-200 ease-in-out" type="submit">
                        Sign in
                    </button>
</div>
</form>
<!-- Divider -->
<div class="mt-8 mb-8 relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center">
<span class="px-3 bg-[#F5F0E5] text-[11px] font-label font-semibold text-on-surface-variant uppercase tracking-[0.1em]">OR</span>
</div>
</div>
<!-- Join Section -->
<div class="bg-surface-container-low rounded-xl p-6 text-center">
<h3 class="font-headline font-semibold text-lg text-on-surface mb-4 tracking-tight">First time?</h3>
<form action="#" class="space-y-4">
<div>
<label class="sr-only" for="invite_code">Invite Code</label>
<input class="block w-full px-4 py-3 border border-outline-variant/50 rounded-full bg-surface-container-lowest text-center text-on-surface placeholder-on-surface-variant/50 focus:ring-0 focus:border-transparent focus:shadow-[0_0_0_2px_#CCE68A] sm:text-sm uppercase tracking-widest font-mono transition-shadow" id="invite_code" name="invite_code" placeholder="INVITE-CODE" type="text"/>
</div>
<button class="w-full flex justify-center py-2.5 px-4 border border-outline-variant text-sm font-semibold text-primary-container rounded-full hover:bg-surface-container-highest transition-colors duration-200" type="button">
                        Join with invite code
                    </button>
</form>
</div>
</div>
<!-- Footer Links -->
<div class="bg-surface-container-low py-4 px-6 border-t border-outline-variant/15 flex justify-center space-x-4 text-xs font-medium text-on-surface-variant">
<a class="hover:text-primary transition-colors" href="#">Forgot password?</a>
<span class="text-outline-variant/50">·</span>
<a class="hover:text-primary transition-colors" href="#">Use a different school</a>
</div>
</div>
