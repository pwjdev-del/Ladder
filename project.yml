name: LadderApp
options:
  bundleIdPrefix: com.ladderapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5"
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: targeted
configFiles:
  Debug: Config/Base.xcconfig
  Release: Config/Base.xcconfig
targets:
  LadderApp:
    type: application
    platform: iOS
    sources:
      - path: LadderApp
        excludes:
          - "**/.DS_Store"
          - "Features/Legacy/**"
          - "Services/Legacy/**"
          - "DesignSystem/Legacy/**"
          - "Models/DomainEnums.swift"
          - "App/Navigation/**"
          - "App/Configuration/**"
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.ladderapp.ladder
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        # iPad deferred per user instruction — iPhone only for this pass.
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_CFBundleDisplayName: "Ladder"
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Ladder uses your calendar to add school and activity deadlines."
        INFOPLIST_KEY_NSCameraUsageDescription: "Ladder uses your camera to scan transcripts and documents."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Ladder accesses your photos to upload transcripts and profile pictures."
        # Info.plist picks up Supabase config via Config/Base.xcconfig → Config/Secrets.xcconfig
        INFOPLIST_KEY_SUPABASE_URL: $(SUPABASE_URL)
        INFOPLIST_KEY_SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        INFOPLIST_KEY_GEMINI_PROXY_URL: $(GEMINI_PROXY_URL)
  LadderAppTests:
    type: bundle.unit-test
    platform: iOS
    sources: tests/LadderAppTests
    dependencies:
      - target: LadderApp
  LadderAppE2E:
    type: bundle.ui-testing
    platform: iOS
    sources: tests/e2e
    dependencies:
      - target: LadderApp
